<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #a0aec0;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      color: #2d3748;
    }

    .input-row input:focus {
      border-color: #667eea;
    }

    .input-row input::placeholder {
      color: #cbd5e0;
    }

    .btn-add {
      padding: 12px 20px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      font-weight: 600;
    }

    .btn-add:hover { background: #5a67d8; }
    .btn-add:active { transform: scale(0.96); }
    .btn-add:disabled { background: #a0aec0; cursor: not-allowed; }

    .filter-row {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }

    .filter-btn {
      padding: 6px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 20px;
      background: #fff;
      color: #718096;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: #667eea;
      border-color: #667eea;
      color: #fff;
    }

    .list { list-style: none; }

    .list li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 12px;
      border-radius: 10px;
      margin-bottom: 8px;
      background: #f7fafc;
      transition: background 0.2s, opacity 0.2s;
    }

    .list li.checked { background: #f0fff4; opacity: 0.7; }
    .list li:hover { background: #edf2f7; }
    .list li.checked:hover { background: #e6ffed; }

    .check-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid #cbd5e0;
      background: #fff;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-size: 0.75rem;
      color: transparent;
    }

    .check-btn:hover { border-color: #667eea; }

    li.checked .check-btn {
      background: #48bb78;
      border-color: #48bb78;
      color: #fff;
    }

    .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #2d3748;
      word-break: break-all;
      transition: all 0.2s;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover { color: #fc8181; background: #fff5f5; }

    .empty {
      text-align: center;
      color: #cbd5e0;
      font-size: 0.9rem;
      padding: 32px 0;
    }

    .loading-msg {
      text-align: center;
      color: #a0aec0;
      font-size: 0.9rem;
      padding: 24px 0;
    }

    .summary {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #e2e8f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.82rem;
      color: #a0aec0;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #fc8181;
      font-size: 0.82rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .clear-btn:hover { background: #fff5f5; }

    .db-badge {
      display: inline-block;
      font-size: 0.7rem;
      background: #ebf8ff;
      color: #3182ce;
      border-radius: 6px;
      padding: 2px 8px;
      margin-left: 8px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트 <span class="db-badge">Supabase</span></h1>
    <p class="subtitle" id="dateLabel"></p>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템을 입력하세요..." maxlength="80">
      <button class="btn-add" id="addBtn" onclick="addItem()">+</button>
    </div>

    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all', this)">전체</button>
      <button class="filter-btn" onclick="setFilter('active', this)">미구매</button>
      <button class="filter-btn" onclick="setFilter('done', this)">구매완료</button>
    </div>

    <ul class="list" id="list"></ul>

    <div class="summary">
      <span id="summaryText"></span>
      <button class="clear-btn" onclick="clearDone()">완료 항목 삭제</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://xetgnglsngembyiiubci.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_N-s770_zGU_CElQEl252WA_F5z97G7B';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let items = [];
    let filter = 'all';

    // ── 데이터 로드 ──
    async function loadItems() {
      setListHTML('<p class="loading-msg">불러오는 중...</p>');
      const { data, error } = await sb
        .from('todo')
        .select('*')
        .order('created_at', { ascending: true });
      if (error) { console.error(error); setListHTML('<p class="empty">데이터 로드 실패</p>'); return; }
      items = data;
      render();
    }

    // ── 아이템 추가 ──
    async function addItem() {
      const input = document.getElementById('itemInput');
      const text = input.value.trim();
      if (!text) return;

      const btn = document.getElementById('addBtn');
      btn.disabled = true;
      input.value = '';

      const { data, error } = await sb
        .from('todo')
        .insert({ text, done: false })
        .select()
        .single();

      btn.disabled = false;
      if (error) { console.error(error); return; }
      items.push(data);
      render();
      input.focus();
    }

    // ── 체크 토글 ──
    async function toggleItem(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;
      const newDone = !item.done;
      const { error } = await sb.from('todo').update({ done: newDone }).eq('id', id);
      if (error) { console.error(error); return; }
      item.done = newDone;
      render();
    }

    // ── 아이템 삭제 ──
    async function deleteItem(id) {
      const { error } = await sb.from('todo').delete().eq('id', id);
      if (error) { console.error(error); return; }
      items = items.filter(i => i.id !== id);
      render();
    }

    // ── 완료 항목 일괄 삭제 ──
    async function clearDone() {
      const { error } = await sb.from('todo').delete().eq('done', true);
      if (error) { console.error(error); return; }
      items = items.filter(i => !i.done);
      render();
    }

    // ── 렌더링 ──
    function render() {
      const visible = items.filter(item => {
        if (filter === 'active') return !item.done;
        if (filter === 'done') return item.done;
        return true;
      });

      if (visible.length === 0) {
        setListHTML('<p class="empty">아이템이 없습니다.</p>');
      } else {
        const listEl = document.getElementById('list');
        listEl.innerHTML = '';
        visible.forEach(item => {
          const li = document.createElement('li');
          if (item.done) li.classList.add('checked');
          li.dataset.id = item.id;
          li.innerHTML = `
            <button class="check-btn" data-action="check">✓</button>
            <span class="item-text">${escapeHtml(item.text)}</span>
            <button class="delete-btn" data-action="delete">✕</button>
          `;
          listEl.appendChild(li);
        });
      }

      const total = items.length;
      const done = items.filter(i => i.done).length;
      document.getElementById('summaryText').textContent =
        total === 0 ? '항목 없음' : `${done} / ${total} 구매완료`;
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function setListHTML(html) {
      document.getElementById('list').innerHTML = html;
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // 이벤트 위임 — 리스트 클릭
    document.getElementById('list').addEventListener('click', async e => {
      const btn = e.target.closest('button[data-action]');
      if (!btn) return;
      const li = btn.closest('li[data-id]');
      if (!li) return;
      const id = li.dataset.id;
      if (btn.dataset.action === 'check') await toggleItem(id);
      if (btn.dataset.action === 'delete') await deleteItem(id);
    });

    // Enter 키로 추가
    document.getElementById('itemInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    // 날짜 표시
    document.getElementById('dateLabel').textContent =
      new Date().toLocaleDateString('ko-KR', {
        year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'
      });

    loadItems();
  </script>
</body>
</html>
